name: Update Stock Prices

on:
  schedule:
    # Run at 6pm UTC Mon-Fri (after US market closes at 4pm EST)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch prices
        run: python3 scripts/fetch-prices.py

      - name: Update results.json timestamp
        run: python3 scripts/update-results-timestamp.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/live-prices.json data/results.json
          git diff --cached --quiet && echo "No price changes" || \
            git commit -m "chore: update stock prices $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && \
            git push
